<aside class="sidebar">
    <div class="logo">
        <div class="logo-icon">
            <i class="fa-solid fa-capsules"></i>
        </div>
        <div>
            <h2>PharmaCo</h2>
            <span>POS System</span>
        </div>

            <span>{{ item.label }}</span>
        </a>
    </nav>
</aside>
